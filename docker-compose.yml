services:
  # ── AI Chatbot Backend (port 8000) ────────────────────────────────────────────
  chatbot-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Web / Contact-Form Backend (port 8001) ────────────────────────────────────
  web-backend:
    build:
      context: ./web-backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ./web-backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
